<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Live Location Tracker</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      font-family: Arial;
    }

    .box{
      width: 420px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom: 20px;
      color: #333;
    }

    button{
      padding: 12px 25px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #0056b3;
    }

    .info{
      margin-top: 25px;
      text-align: left;
    }

    .info h2{
      margin-top: 15px;
      font-size: 20px;
      color: #222;
    }

  </style>

</head>
<body>

  <div class="box">

    <!-- <h1>📍 Live Location Tracker</h1>

    <button onclick="getLocation()">
      Get My Location
    </button>

    <div class="info">

      <h2 id="city">City :</h2>

      <h2 id="area">Area :</h2>

      <h2 id="state">State :</h2>

      <h2 id="country">Country :</h2>

      <h2 id="pincode">Pincode :</h2>

    </div> -->

  </div>

  <script>

    function getLocation(){

      if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

          async function(position){

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

         
            let response = await fetch(
              `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`
            );

            let data = await response.json();

            console.log(data);

  
            let city =
              data.address.city ||
              data.address.town ||
              data.address.village ||
              data.address.county ||
              "Not Found";

      
            let area =
              data.address.suburb ||
              data.address.neighbourhood ||
              data.address.hamlet ||
              data.address.city_district ||
              "Not Found";

       
            document.getElementById("city").innerText =
            "City : " + city;

            document.getElementById("area").innerText =
            "Area : " + area;

            document.getElementById("state").innerText =
            "State : " + (data.address.state || "Not Found");

            document.getElementById("country").innerText =
            "Country : " + (data.address.country || "Not Found");

            document.getElementById("pincode").innerText =
            "Pincode : " + (data.address.postcode || "Not Found");

          },

          function(error){

            alert("Please Allow Location Access");

          }

        );

      }
      else{

        alert("Geolocation Not Supported");

      }

    }

  </script>
  <!-- <script src="main.js"></script> -->

</body>
</html>
