<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quize</title>
    <style>
        .quiz-container {
            background-color: aqua;
            /* background: #fff; */
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            justify-self: center;
            margin-top: 100px;
        }

        .score {
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: rgb(166, 148, 174);
            color: blue;
            font-weight: bold;
            font-size: larger;
            width: 72%;
            margin-left: 84px;
            height: 40px;
            justify-content: center;
        }
        
    </style>
</head>

<body>
    <div class="quiz-container">

        <h1>🤓Quiz Time</h1>
        <div class="score">
            Score: <span id="score">0</span>
        </div>
        <div class="question">
            <h1>What is full form of HTML?</h1>
            <button class="option">Hyper Text Markup Language</button>
            <br></br>
            <button class="option">High Text Markup Language</button>
            <br></br>
            <button class="option">Hyper Text Markdown Language</button>
            <br></br>
            <button class="option">High Text Markdown Language</button>
        </div>

    </div>



</body>

</html>
